services:
  - type: web
    name: edgefinder
    runtime: python
    buildCommand: pip install -e .
    startCommand: python scripts/render_start.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: EDGEFINDER_POLYGON_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false  # Supabase pooler URL: postgresql://postgres.[ref]:[pass]@aws-0-[region].pooler.supabase.com:6543/postgres
