services:
  - type: web
    name: edgefinder
    runtime: python
    buildCommand: pip install -e .
    startCommand: python scripts/render_start.py
    envVars:
      - key: EDGEFINDER_POLYGON_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: edgefinder-db
          property: connectionString

databases:
  - name: edgefinder-db
    plan: free
    databaseName: edgefinder
