services:
  - type: web
    name: edgefinder
    runtime: python
    buildCommand: pip install -e .
    startCommand: python scripts/render_start.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: EDGEFINDER_POLYGON_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false  # Set manually — use Neon (free) or any PostgreSQL provider
