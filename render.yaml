services:
  - type: web
    name: edgefinder
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "from modules.database import init_db; init_db()"
    startCommand: gunicorn dashboard.app:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
