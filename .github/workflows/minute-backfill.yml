name: Minute-bars backfill (intraday pilot)

# Flag-gated (push-triggered): builds the R2 minute-bar store for the
# frozen intraday pilot menu. ops/minute-backfill.flag content:
#   - 'MENU'     -> resolve the pilot menu from the daily store and PRINT
#                   it (workflows can't push — committing intraday/menu.json
#                   is the orchestrator's job)
#   - 'EXECUTE'  -> full resumable backfill from the committed menu
#   - anything else -> backfill --dry-run (plan only, no writes)
# Same convention as db-slim / retire-arena / promote-finalists.

on:
  push:
    branches: [claude/handoff-doc-review-176vbl, main]
    paths: [ops/minute-backfill.flag]

permissions:
  contents: read

concurrency:
  group: minute-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EDGEFINDER_POLYGON_API_KEY: ${{ secrets.EDGEFINDER_POLYGON_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e .
      - name: Resolve menu / backfill / dry-run
        run: |
          set -euo pipefail
          MODE="$(tr -d '[:space:]' < ops/minute-backfill.flag || true)"
          if [ "$MODE" = "MENU" ]; then
            echo "MENU mode — resolving the pilot menu from the daily store"
            echo "(result is printed below; committing intraday/menu.json is the orchestrator's job)"
            python scripts/resolve_intraday_menu.py
          elif [ "$MODE" = "EXECUTE" ]; then
            echo "EXECUTE mode — full minute-bar backfill from the committed menu (resumable)"
            python scripts/backfill_minute_bars.py --menu intraday/menu.json --start 2021-06-01
            python -m edgefinder.data.minutestore stats
          else
            echo "DRY-RUN mode (flag content: $MODE)"
            python scripts/backfill_minute_bars.py --menu intraday/menu.json --start 2021-06-01 --dry-run
          fi
