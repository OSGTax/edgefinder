name: Intraday Cycle

# Drives EdgeFinder's live intraday cycle (entries + exits + state persist +
# equity snapshot) by POSTing a protected endpoint every 5 minutes during
# market hours. Each request both *wakes* the idle Render service and runs
# exactly one cycle in-process — replacing the in-process APScheduler timer,
# which stalls when the Render web service idles after the morning. This is
# the root-cause fix for open positions going unmonitored (no stop/target),
# i.e. the long-standing "0 closed trades" symptom.
#
# When EDGEFINDER_INTRADAY_EXTERNAL_DRIVER=true on Render, init_services
# disables the in-process intraday timer, so this cron is the SINGLE driver
# (no double-execution). A server-side single-flight lock drops overlapping
# fires. Flip that flag and enable this workflow together at cutover.
#
# Cron runs every 5 min across a wide UTC band (covers 08:00-16:59 EST and
# 09:00-17:59 EDT). A gate step proceeds only when the *current ET time* is
# within 09:30-16:00 Mon-Fri, so off-hours and DST-shadow fires no-op. The
# endpoint itself additionally skips on market holidays (single source of
# truth stays in the app, not duplicated here).
#
# --- Enabling ---------------------------------------------------------
# Repo -> Settings -> Secrets and variables -> Actions:
#   - Secrets:   EOD_TRIGGER_TOKEN          (matches EDGEFINDER_EOD_TRIGGER_TOKEN on Render)
#   - Variables: EDGEFINDER_URL             (e.g. https://edgefinder.onrender.com)
#                INTRADAY_CYCLE_ENABLED=true   (job-level kill switch)
#
# --- Stopping ---------------------------------------------------------
# Flip INTRADAY_CYCLE_ENABLED to 'false' — no deploy. The `if:` gate skips.
# NOTE: with the external-driver flag on, turning this OFF leaves the intraday
# loop unmonitored (instant pause). To fully revert to the in-process timer,
# set EDGEFINDER_INTRADAY_EXTERNAL_DRIVER=false on Render and restart — this is
# independent of the EOD endpoint, which keeps working either way.

on:
  schedule:
    - cron: '*/5 13-21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: vars.INTRADAY_CYCLE_ENABLED == 'true'
    timeout-minutes: 5
    concurrency:
      group: intraday-cycle
      cancel-in-progress: false
    steps:
      - name: Gate to RTH (09:30-16:00 ET, Mon-Fri)
        id: gate
        run: |
          dow=$(TZ=America/New_York date +%u)   # 1=Mon..7=Sun
          mins=$(( 10#$(TZ=America/New_York date +%H) * 60 + 10#$(TZ=America/New_York date +%M) ))
          echo "ET dow=$dow minutes_since_midnight=$mins"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$dow" -ge 6 ]; then
            echo "Weekend — skipping."; echo "run=false" >> "$GITHUB_OUTPUT"
          elif [ "$mins" -ge 570 ] && [ "$mins" -le 960 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"   # 570=09:30, 960=16:00
          else
            echo "Outside RTH — skipping."; echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger intraday cycle
        if: steps.gate.outputs.run == 'true'
        env:
          EDGEFINDER_URL: ${{ vars.EDGEFINDER_URL }}
          EOD_TRIGGER_TOKEN: ${{ secrets.EOD_TRIGGER_TOKEN }}
        run: |
          if [ -z "$EDGEFINDER_URL" ] || [ -z "$EOD_TRIGGER_TOKEN" ]; then
            echo "::error::EDGEFINDER_URL variable or EOD_TRIGGER_TOKEN secret not set"
            exit 1
          fi
          # 3 attempts / 60s each (worst case ~210s < the 300s interval) so a
          # cold-start wake can't stack into the next 5-min fire.
          for attempt in 1 2 3; do
            code=$(curl -sS -o /tmp/intraday_resp -w '%{http_code}' \
              --max-time 60 \
              -X POST "$EDGEFINDER_URL/api/admin/run-intraday" \
              -H "Authorization: Bearer $EOD_TRIGGER_TOKEN" || echo "000")
            echo "Attempt $attempt -> HTTP $code"
            cat /tmp/intraday_resp || true
            echo
            if [ "$code" = "202" ]; then
              echo "Intraday cycle triggered."
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "::error::Failed to trigger intraday cycle after retries"
          exit 1
