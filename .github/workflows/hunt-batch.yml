name: Hunt batch

# Runs the current wave of pre-registered hunt candidates through the v2
# validator against the production DB. Triggered by committing a new
# hunt/queue.json (the wave manifest) — so the roster code and parameters
# are ALWAYS committed before the first run executes (pre-registration is
# structural, not procedural).
#
# Every run records to validation_runs (--record) with a hunt-r1:* label;
# the driving session reads results back via SQL and compiles the round
# report. Waves are serialized by the concurrency group.

on:
  push:
    # session branches only — merging a fired queue to main must NOT
    # re-run the wave (duplicate validation_runs rows)
    branches: [claude/handoff-doc-review-176vbl]
    paths: [hunt/queue.json]

permissions:
  contents: read

concurrency:
  group: hunt-batch
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: echo "matrix=$(jq -c '.runs' hunt/queue.json)" >> "$GITHUB_OUTPUT"

  run:
    needs: plan
    if: needs.plan.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 6   # be kind to the Supabase pooler
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    name: ${{ matrix.id }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # --bars-from r2 lanes read the Parquet store directly
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: Validate ${{ matrix.id }}
        run: |
          set -euo pipefail
          echo "Running: python -m edgefinder.engine.validate ${{ matrix.args }}"
          # transient pooler connection timeouts happen under parallel load
          # (wave 1 lost one job to it); a run records only at its very end,
          # so a retry after an early connection failure cannot double-record
          for attempt in 1 2 3; do
            if python -m edgefinder.engine.validate ${{ matrix.args }}; then
              exit 0
            fi
            echo "attempt $attempt failed — retrying in 30s"
            sleep 30
          done
          exit 1
