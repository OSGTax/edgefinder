# Phase 0 of the autonomy loop (see docs/ROUTINES.md history): prove that
# Max-subscription auth (claude setup-token → CLAUDE_CODE_OAUTH_TOKEN repo
# secret) can run Claude Code inside this repo's Actions at all, before any
# real trading workflow is built on top of it. Manual trigger only; the
# prompt is deliberately inert. Delete this file once the real
# trading-agent workflow ships.
name: Claude smoke test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The default workflow token skips the action's OIDC->app-token
          # exchange (which needs id-token:write + the Claude GitHub App).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "State the current UTC time and this repository's name, then stop. Do not read, modify, or execute anything else."
          claude_args: "--max-turns 2"
