name: EOD Jobs

# Triggers EdgeFinder's post-close jobs (nightly scan + daily-indicator cycle +
# EOD snapshot/benchmark/rotation/corporate actions) by hitting a protected
# endpoint on the live web service.
#
# Why this exists: the jobs are scheduled by an in-process APScheduler inside
# the Render web service, which only fires while the service is awake. On
# Render the service idles after the market-morning traffic dies down, so the
# 6:15 PM ET nightly scan (and the rest) silently never run. This cron's HTTP
# request both *wakes* the idle service and runs the jobs in-process, keeping
# the live arena's in-memory watchlists coherent.
#
# Fires at 22:15 and 23:15 UTC so exactly one run lands at 18:15 ET in both
# EDT and EST; a guard step skips the off-DST hour. DST-safe via `date`.
#
# --- Enabling ---------------------------------------------------------
# Repo -> Settings -> Secrets and variables -> Actions:
#   - Secrets:   EOD_TRIGGER_TOKEN   (matches EDGEFINDER_EOD_TRIGGER_TOKEN on Render)
#   - Variables: EDGEFINDER_URL      (e.g. https://edgefinder.onrender.com)
#                EOD_JOBS_ENABLED=true   (job-level kill switch)
#
# --- Stopping ---------------------------------------------------------
# Flip EOD_JOBS_ENABLED to 'false' — no deploy. The `if:` gate skips the job.

on:
  schedule:
    - cron: '15 22 * * 1-5'   # 18:15 ET during EDT
    - cron: '15 23 * * 1-5'   # 18:15 ET during EST
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: vars.EOD_JOBS_ENABLED == 'true'
    timeout-minutes: 5
    concurrency:
      group: eod-jobs
      cancel-in-progress: false
    steps:
      - name: Skip off-DST hour (run only at 18:00 ET)
        id: gate
        run: |
          hour_et=$(TZ=America/New_York date +%H)
          echo "ET hour is $hour_et"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$hour_et" != "18" ]; then
            echo "Not 18:00 ET (DST shadow run) — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger EOD jobs
        if: steps.gate.outputs.run == 'true'
        env:
          EDGEFINDER_URL: ${{ vars.EDGEFINDER_URL }}
          EOD_TRIGGER_TOKEN: ${{ secrets.EOD_TRIGGER_TOKEN }}
        run: |
          if [ -z "$EDGEFINDER_URL" ] || [ -z "$EOD_TRIGGER_TOKEN" ]; then
            echo "::error::EDGEFINDER_URL variable or EOD_TRIGGER_TOKEN secret not set"
            exit 1
          fi
          # Retry to absorb cold-start latency: the first request wakes the
          # idle Render service, which can take 30-60s before it answers.
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/eod_resp -w '%{http_code}' \
              --max-time 90 \
              -X POST "$EDGEFINDER_URL/api/admin/run-eod" \
              -H "Authorization: Bearer $EOD_TRIGGER_TOKEN" || echo "000")
            echo "Attempt $attempt -> HTTP $code"
            cat /tmp/eod_resp || true
            echo
            if [ "$code" = "202" ]; then
              echo "EOD jobs triggered."
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "::error::Failed to trigger EOD jobs after retries"
          exit 1
