name: Intraday validate (smoke / ad-hoc)

# Flag-gated (push-triggered): runs ONE intraday validation against the R2
# minute store, to verify the engine end-to-end on REAL data (the unit tests
# prove correctness on synthetic frames; this proves the engine + minute store
# + frozen menu integrate on actual sessions — half-days, gaps, real bar
# counts). The line of ops/intraday.flag is passed verbatim as CLI args to
# engine.intraday_validate, EXCEPT the literal 'idle' which no-ops.
#   e.g.  --strategy mean_rev:SPY --symbols SPY --start 2026-03-02 \
#         --end 2026-06-11 --bars-from r2 --costed --flatten-at-close
# This is an ad-hoc verification tool; the pre-registered intraday HUNT
# (phase 3) gets its own matrix workflow (intraday/queue.json).

on:
  push:
    branches: [claude/handoff-doc-review-176vbl, main]
    paths: [ops/intraday.flag]

permissions:
  contents: read

concurrency:
  group: intraday-validate
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EDGEFINDER_POLYGON_API_KEY: ${{ secrets.EDGEFINDER_POLYGON_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e .
      - name: Run intraday validate
        run: |
          set -euo pipefail
          ARGS="$(head -1 ops/intraday.flag | tr -d '\r')"
          if [ "$(echo "$ARGS" | tr -d '[:space:]')" = "idle" ] || [ -z "$ARGS" ]; then
            echo "intraday.flag is idle — nothing to run"
            exit 0
          fi
          if [ "$(echo "$ARGS" | cut -d' ' -f1)" = "diag" ]; then
            SYM="$(echo "$ARGS" | cut -d' ' -f2)"; SYM="${SYM:-SPY}"
            echo "DIAG: store stats + manifest + load probe for $SYM"
            python - "$SYM" <<'PY'
import sys, json
from datetime import date
from edgefinder.data.minutestore import MinuteStore
sym = sys.argv[1]
s = MinuteStore()
print("stats:", json.dumps(s.stats()))
months = s.months(sym)
keys = sorted(months)
print(f"{sym}: {len(keys)} manifest months; first={keys[:2]} last={keys[-2:]}")
recent = [m for m in keys if m >= "2025-06"]
print(f"{sym}: months>=2025-06: {recent}")
for m in recent[:1] + recent[-1:]:
    print(f"  {m}: {months[m]}")
for a, b in [(date(2026,6,1), date(2026,6,11)), (date(2025,6,2), date(2025,6,6))]:
    f = s.load_minute_bars([sym], a, b)
    df = f.get(sym)
    print(f"load {a}..{b}: {0 if df is None else len(df)} rows")
PY
            exit 0
          fi
          echo "Running: python -m edgefinder.engine.intraday_validate $ARGS"
          python -m edgefinder.engine.intraday_validate $ARGS
