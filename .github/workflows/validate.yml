name: Strategy validation (walk-forward OOS)

# Runs the Phase-2 validation lab against the daily_bars table: for each
# strategy it optimizes parameters in-sample and scores them out-of-sample
# across rolling folds, then reports whether OOS results beat SPY. Reports are
# uploaded as build artifacts (not auto-committed — Phase 3 persists validated
# configs to the strategy_parameters table, which is the real feedback loop).
#
# Pure compute against the DB — no Claude token needed.
#
# --- Enabling ---------------------------------------------------------
# Secrets:   DATABASE_URL          (Supabase pooler URL)
# Variables: VALIDATE_ENABLED=true (kill switch)
#
# Run it: Actions -> "Strategy validation" -> Run workflow (pick a universe).

on:
  schedule:
    - cron: '0 14 * * 6'   # Saturday — markets closed, no time pressure
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Strategy (blank = all)'
        required: false
        default: ''
      top_n:
        description: 'Top-N most-liquid symbols to validate over'
        required: false
        default: '50'
      search_iters:
        description: 'Param configs sampled per in-sample fold'
        required: false
        default: '24'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    if: vars.VALIDATE_ENABLED == 'true'
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: pip install -e .

      - name: Run walk-forward validation
        run: |
          STRAT="${{ inputs.strategy }}"
          TOPN="${{ inputs.top_n }}"; TOPN="${TOPN:-50}"
          ITERS="${{ inputs.search_iters }}"; ITERS="${ITERS:-24}"
          if [ -n "$STRAT" ]; then
            SEL="--strategy $STRAT"
          else
            SEL="--all"
          fi
          python -m edgefinder.backtest.validate $SEL \
            --mode top --top-n "$TOPN" --search-iters "$ITERS" --write

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: reviews/validation-*.md
          if-no-files-found: ignore
