name: Tests

# Runs the test suite on every PR to main. Any auto-merge
# (`gh pr merge --auto`) waits for this workflow to go green before the
# change lands.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package with dev deps
        run: pip install -e '.[dev]'

      - name: Run unit tests (non-integration)
        # test_market.py has a known pandas-len flake — exclude until
        # it's fixed. Everything else must pass.
        run: python -m pytest tests/ -m "not integration" --ignore=tests/test_market.py
