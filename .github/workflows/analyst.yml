name: AI Analyst

# Produces the AI analyst account's daily decision WITH the plain-English
# rationale. Runs here (not in the Render web process) because the rationale
# shells out to the `claude` CLI — installed below and authenticated with the
# CLAUDE_CODE_OAUTH_TOKEN subscription secret (no Anthropic API key). The
# decision is written to agent_decisions; the Render 9:45 ET cycle then trades
# it. Render's in-process run is intentionally NOT scheduled (it has no CLI, so
# it could only write terse fallback text and would clobber this richer one).
#
# Fires ~9:00 ET (before the 9:45 cycle). Gated OFF only if ANALYST_ENABLED is
# explicitly 'false' (runs by default once on main).
#
# --- Secrets/vars (already present for the watchdog) ------------------
#   Secrets:   DATABASE_URL, CLAUDE_CODE_OAUTH_TOKEN
#   Variables: ANALYST_ENABLED (optional kill switch; set 'false' to stop)

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 13:00 UTC = 9:00 ET (EDT) / 8:00 ET (EST)
  workflow_dispatch:
    inputs:
      universe:
        description: "universe spec"
        default: "top:200"

permissions:
  contents: read

concurrency:
  group: ai-analyst
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    if: vars.ANALYST_ENABLED != 'false'
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install claude binary
        run: npm install -g @anthropic-ai/claude-code
      - name: Install package
        run: pip install -e .
      - name: Run analyst research
        run: |
          python -m edgefinder.agents.analyst \
            --name ai_analyst \
            --universe "${{ github.event.inputs.universe || 'top:200' }}" \
            --use-llm
