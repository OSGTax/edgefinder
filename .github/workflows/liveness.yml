name: Liveness Watchdog

# Detects a STALLED live trading loop and pages the owner via a GitHub issue.
#
# The intraday cycle writes a heartbeat (system_heartbeat) at the end of every
# run. This fast, deterministic cron runs the watchdog's DB checks (which now
# include check_cycle_liveness) and then reconciles unresolved CRITICAL
# observations into GitHub issues (opening on stall, auto-closing on recovery).
# It runs MORE often than the hourly Watchdog because a trading stall must be
# caught in minutes, not an hour — and it is deliberately Claude-free (no
# reasoning step) so it stays fast and consumes no subscription quota.
#
# Runs every 15 min across a wide UTC band; an ET gate trims to market hours.
#
# --- Enabling ---------------------------------------------------------
# Repo -> Settings -> Secrets and variables -> Actions:
#   - Secrets:   DATABASE_URL            (Supabase pooler URL)
#   - Variables: LIVENESS_ENABLED=true   (job-level kill switch)
# GITHUB_TOKEN is provided automatically; `issues: write` lets gh file issues.
#
# --- Stopping ---------------------------------------------------------
# Flip LIVENESS_ENABLED to 'false' — no deploy. The `if:` gate skips the job.

on:
  schedule:
    - cron: '*/15 13-21 * * 1-5'   # ~market hours across EDT+EST; ET gate trims edges
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  liveness:
    runs-on: ubuntu-latest
    if: vars.LIVENESS_ENABLED == 'true'
    timeout-minutes: 5
    concurrency:
      group: liveness
      cancel-in-progress: true
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Gate to RTH (09:30-16:00 ET, Mon-Fri)
        id: gate
        run: |
          dow=$(TZ=America/New_York date +%u)   # 1=Mon..7=Sun
          mins=$(( 10#$(TZ=America/New_York date +%H) * 60 + 10#$(TZ=America/New_York date +%M) ))
          echo "ET dow=$dow minutes_since_midnight=$mins"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$dow" -ge 6 ]; then
            echo "Weekend — skipping."; echo "run=false" >> "$GITHUB_OUTPUT"
          elif [ "$mins" -ge 570 ] && [ "$mins" -le 960 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"   # 570=09:30, 960=16:00
          else
            echo "Outside RTH — skipping."; echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        if: steps.gate.outputs.run == 'true'
        run: pip install -e .

      - name: Deterministic checks (writes observations)
        if: steps.gate.outputs.run == 'true'
        run: python -m edgefinder.agents.watchdog --force --ignore-window

      - name: Reconcile GitHub-issue alerts
        if: steps.gate.outputs.run == 'true'
        run: python -m edgefinder.agents.alerts --force --ignore-window
