name: Run v2 cycle

# Flag-gated (push-triggered): runs ONE engine-v2 portfolio cycle against
# production from a 7GB Actions runner. ops/cycle.flag containing exactly
# "EXECUTE" trades for real; any other content is a --dry-run (intended
# trades printed, nothing persisted). Built for catch-up/verification runs
# (e.g. the missed 2026-06-11 first cycle) — the steady-state driver
# remains the Render in-process scheduler at 9:45 ET.

on:
  push:
    branches: [claude/handoff-doc-review-176vbl, main]
    paths: [ops/cycle.flag]

permissions:
  contents: read

concurrency:
  group: run-v2-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EDGEFINDER_POLYGON_API_KEY: ${{ secrets.EDGEFINDER_POLYGON_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e .
      - name: Run cycle (EXECUTE = real; else dry-run)
        run: |
          set -euo pipefail
          MODE=$(tr -d '[:space:]' < ops/cycle.flag)
          if [ "$MODE" = "EXECUTE" ]; then
            python -m edgefinder.engine.live
          else
            echo "flag is '$MODE' (not EXECUTE) — dry run"
            python -m edgefinder.engine.live --dry-run
          fi
