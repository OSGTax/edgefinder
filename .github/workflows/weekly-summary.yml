name: Weekly portfolio summary

# Saturday morning ET, synthesizes the past 7 days of per-strategy
# reviews + trades into a portfolio-level digest. Commits the digest
# to reviews/WEEK-YYYY-WWN.md on main. No code or parameter changes.
#
# --- Enabling ---------------------------------------------------------
# Same secrets as coach.yml: DATABASE_URL, CLAUDE_CODE_OAUTH_TOKEN.
# Repo variable WEEKLY_SUMMARY_ENABLED=true.

on:
  # Saturday 13:00 UTC = 09:00 EDT or 08:00 EST. Either is fine for a
  # weekly digest — markets are closed and no time-sensitivity.
  schedule:
    - cron: '0 13 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print prompt, do not write or commit)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  summary:
    runs-on: ubuntu-latest
    if: vars.WEEKLY_SUMMARY_ENABLED == 'true'
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install package
        run: pip install -e .

      - name: Configure git
        run: |
          git config --global user.name "edgefinder-coach[bot]"
          git config --global user.email "edgefinder-coach@users.noreply.github.com"

      - name: Run weekly summary
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python -m edgefinder.agents.weekly_summary --force $ARGS
