name: Market-hours keepalive

# SUPERSEDED by the Intraday Cycle workflow (intraday-cycle.yml). That cron
# now wakes the Render box every 5 min AND runs the cycle, so a separate
# warmth ping is redundant. Set KEEPALIVE_ENABLED=false. The file is kept so
# that reverting to the in-process timer (set EDGEFINDER_INTRADAY_EXTERNAL_DRIVER
# =false on Render) still has its warmth helper available — just flip the
# variable back on.
#
# Original purpose: keep the web service awake so the in-process intraday
# cycle (signal_check / position_monitor, every 5 min) actually fires.
# Pings the public /api/health endpoint; no secret required. Covers both EDT
# and EST market hours via a wide UTC range (13:00-22:00).
#
# --- Enabling ---------------------------------------------------------
# Repo -> Settings -> Secrets and variables -> Actions -> Variables:
#   - EDGEFINDER_URL   = https://<your-app>.onrender.com
#   - KEEPALIVE_ENABLED = true   (kill switch; leave 'false' under cron-driven mode)
#
# --- Stopping ---------------------------------------------------------
# Flip KEEPALIVE_ENABLED to 'false' — the `if:` gate skips the job.
#
# Note: a dedicated always-on worker service is the more robust long-term
# answer for a real-money system; the cron-driven model is the low-effort fix.

on:
  schedule:
    - cron: '*/10 13-22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    if: vars.KEEPALIVE_ENABLED == 'true'
    timeout-minutes: 3
    steps:
      - name: Ping health endpoint
        env:
          EDGEFINDER_URL: ${{ vars.EDGEFINDER_URL }}
        run: |
          if [ -z "$EDGEFINDER_URL" ]; then
            echo "::error::EDGEFINDER_URL variable not set"
            exit 1
          fi
          code=$(curl -sS -o /tmp/health -w '%{http_code}' --max-time 60 \
            "$EDGEFINDER_URL/api/health" || echo "000")
          echo "health -> HTTP $code"
          cat /tmp/health 2>/dev/null || true
          echo
          # A wake-up request can return non-200 while cold-starting; that's
          # still fine — the point is to keep the box warm, not to assert health.
          exit 0
