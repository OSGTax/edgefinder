name: DB slim (daily_bars retention rebuild)

# Executes scripts/slim_daily_bars.py against the production DB (owner
# approved Option B, 2026-06-10). Triggered by committing ops/slim.flag:
#   - any content        -> DRY RUN (prints keep/shed counts, no writes)
#   - content 'EXECUTE'  -> the real rebuild-and-swap
# The script self-gates: it aborts unless every non-protected symbol is
# fingerprint-current in the R2 mirror.

on:
  push:
    branches: [claude/handoff-doc-review-176vbl, main]
    paths: [ops/slim.flag]

permissions:
  contents: read

concurrency:
  group: db-slim
  cancel-in-progress: false

jobs:
  slim:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e .
      - name: Slim daily_bars
        run: |
          set -euo pipefail
          MODE="$(tr -d '[:space:]' < ops/slim.flag || true)"
          if [ "$MODE" = "EXECUTE" ]; then
            echo "EXECUTE mode — rebuilding daily_bars"
            python scripts/slim_daily_bars.py --execute
          else
            echo "DRY-RUN mode (flag content: $MODE)"
            python scripts/slim_daily_bars.py
          fi
