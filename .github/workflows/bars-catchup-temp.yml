name: Bars catch-up load (temporary)

# TEMPORARY — delete after the 2026-05-27..2026-06-09 catch-up lands.
# The driving session computed the top-1000/day survivorship-free rows
# locally (same methodology as the historical ingest: flat-file day_aggs
# filtered to active+delisted common stocks + benchmark ETFs) but cannot
# reach the DB directly, so the rows ride the repo (data/tmp_catchup/,
# gzipped) and this job upserts them with the standard loader. Idempotent.

on:
  push:
    branches: [claude/handoff-doc-review-176vbl]
    paths:
      - data/tmp_catchup/**
      - .github/workflows/bars-catchup-temp.yml

permissions:
  contents: read

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e .
      - name: Upsert catch-up rows into daily_bars
        run: |
          python - <<'PY'
          import gzip, json
          from datetime import date

          from edgefinder.db.engine import get_engine
          from scripts.backfill_daily_bars import upsert_daily_bars

          path = "data/tmp_catchup/daily_bars_2026-05-27_2026-06-09.json.gz"
          with gzip.open(path, "rt") as f:
              rows = json.load(f)
          for r in rows:
              r["date"] = date.fromisoformat(r["date"])
          n = upsert_daily_bars(get_engine(), rows)
          print(f"upserted {n} rows from {path}")
          PY
