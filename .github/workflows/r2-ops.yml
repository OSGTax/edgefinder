name: R2 store ops

# Operate/verify the Cloudflare R2 Parquet bar store from Actions (the
# four R2_* repo secrets exist as of 2026-06-10). Used for:
#   - stats:  manifest summary (symbols, rows, last sync)
#   - verify: random-sample byte-for-byte comparison of R2 parquet vs the
#             DB rows it mirrors (the same check that gated the Phase-4
#             export: zero mismatches expected)
# Triggered by committing ops/r2-check.flag (any content change) or by
# manual dispatch.

on:
  push:
    branches: [claude/handoff-doc-review-176vbl, main]
    paths: [ops/r2-check.flag]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e .
      - name: Store stats (pre)
        run: python -m edgefinder.data.barstore stats
      - name: Incremental sync DB -> R2
        if: contains(github.event.head_commit.message, 'r2-sync') || github.event_name == 'workflow_dispatch'
        run: python -m edgefinder.data.barstore sync
      - name: Verify 50-symbol random sample vs DB
        run: python -m edgefinder.data.barstore verify -n 50
