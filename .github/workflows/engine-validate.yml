name: Engine validate (manual)

# One-click runner for the v2 engine's walk-forward validation CLI
# (python -m edgefinder.engine.validate) against the production DB —
# the same lanes the hunt will use. Examples for the args box:
#
#   null control (must NOT pass; expect 0.00 excess Sharpe / -0.02pp):
#     --strategy buy_and_hold:SPY --symbols SPY --schedule monthly --holdout-days 126
#
#   stock lane (PIT top-N, costed, total-return, pinned sealed holdout):
#     --strategy equal_weight --universe top:500 --start 2021-06-01 \
#       --costed --div-adjust --holdout-start 2025-12-05 --record
#
# The sealed-holdout discipline applies here exactly as in a Codespace:
# never pass --burn-holdout without explicit owner sign-off.

on:
  workflow_dispatch:
    inputs:
      args:
        description: "Arguments for python -m edgefinder.engine.validate"
        required: true
        default: "--strategy buy_and_hold:SPY --symbols SPY --schedule monthly --holdout-days 126"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: pip install -e .

      - name: Run engine validate
        run: |
          set -euo pipefail
          echo "Running: python -m edgefinder.engine.validate ${{ inputs.args }}"
          python -m edgefinder.engine.validate ${{ inputs.args }}
