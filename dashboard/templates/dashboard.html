{% extends "base.html" %}
{% block title %}Portfolio — EdgeFinder{% endblock %}

{% block content %}
<div class="flex items-center gap-12 mb-16 flex-wrap">
  <h2>Portfolio</h2>
  <div id="pf-fleet" class="pf-fleet flex-1"></div>
  <span id="pf-ops-badge"></span>
</div>

<div class="c-card mb-16">
  <div class="c-card-header">Accounts — total return
    <span class="spacer"></span>
    <div id="pf-legend-actions" class="c-chips"></div>
    <div id="pf-ranges"></div>
  </div>
  <div id="pf-legend" class="c-chips scroll pf-legend"></div>
  <div class="c-card-body tight">
    <div class="ch-shell">
      <div id="pf-xlegend" class="ch-legend pf-xlegend"></div>
      <div class="ch-pane tall" id="pf-chart"></div>
    </div>
  </div>
</div>

<div id="pf-grid" class="pf-grid mb-16"></div>

<div class="grid-2 pf-low">
  <div class="c-card">
    <div class="c-card-header">Market</div>
    <div class="c-card-body" id="pf-market"></div>
  </div>
  <div class="c-card">
    <div class="c-card-header">Live proof — vs SPY
      <span class="spacer"></span>
      <a href="/lab" class="c-chip">Lab →</a>
    </div>
    <div class="c-card-body" id="pf-proof"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/pages/portfolio.js"></script>
{% endblock %}
