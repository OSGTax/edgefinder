{% extends "base.html" %}
{% block title %}Portfolio — EdgeFinder{% endblock %}

{% block content %}
<div class="flex items-center gap-12 mb-16 flex-wrap">
  <h2 class="flex-1">Portfolio</h2>
  <div class="c-seg" id="pf-lane">
    <button data-lane="all" class="active">All</button>
    <button data-lane="arena">Arena $5k</button>
    <button data-lane="v2">V2 $100k</button>
  </div>
  <span id="pf-ops-badge"></span>
</div>

<div id="pf-hero" class="grid-4 mb-16"></div>

<div class="grid-2 mb-16 pf-charts">
  <div class="c-card">
    <div class="c-card-header">Equity
      <span class="spacer"></span>
      <div id="pf-eq-ranges"></div>
    </div>
    <div class="c-card-body tight"><div class="ch-pane equity" id="pf-equity"></div></div>
  </div>
  <div class="c-card">
    <div class="c-card-header">Strategies vs SPY (%)
      <span class="spacer"></span>
      <div id="pf-cmp-legend" class="c-chips"></div>
    </div>
    <div class="c-card-body tight"><div class="ch-pane equity" id="pf-compare"></div></div>
  </div>
</div>

<div class="grid-2 mb-16 pf-mid">
  <div class="c-card">
    <div class="c-card-header">P&amp;L calendar</div>
    <div class="c-card-body" id="pf-calendar"></div>
  </div>
  <div class="c-card">
    <div class="c-card-header">Live proof — vs SPY <span class="spacer"></span>
      <a href="/lab" class="c-chip">Lab →</a></div>
    <div class="c-card-body" id="pf-proof"></div>
  </div>
</div>

<div class="c-card mb-16">
  <div class="c-card-header">Open positions <span class="spacer"></span><span id="pf-pos-count" class="t-dim"></span></div>
  <div class="c-card-body tight c-table-wrap" id="pf-positions"></div>
</div>

<div class="c-card">
  <div class="c-card-header">Market</div>
  <div class="c-card-body" id="pf-market"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/pages/portfolio.js"></script>
{% endblock %}
