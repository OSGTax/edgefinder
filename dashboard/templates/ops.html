{% extends "base.html" %}
{% block title %}Ops — EdgeFinder{% endblock %}

{% block content %}
<div class="flex items-center gap-12 mb-16 flex-wrap">
  <h2 class="flex-1">Ops &amp; Health</h2>
  <span id="ops-version" class="t-dim num"></span>
</div>

<div class="grid-2 mb-16">
  <div class="c-card">
    <div class="c-card-header">Heartbeats</div>
    <div class="c-card-body" id="ops-heartbeats"></div>
  </div>
  <div class="c-card">
    <div class="c-card-header">Scheduler</div>
    <div class="c-card-body" id="ops-scheduler"></div>
  </div>
</div>

<div class="grid-2 mb-16">
  <div class="c-card">
    <div class="c-card-header">Two-tier storage</div>
    <div class="c-card-body" id="ops-storage"></div>
  </div>
  <div class="c-card">
    <div class="c-card-header">Open observations</div>
    <div class="c-card-body" id="ops-observations"></div>
  </div>
</div>

<div class="c-card">
  <div class="c-card-header">Agent activity
    <span class="spacer"></span>
    <label class="t-dim"><input type="checkbox" id="ops-resolved" checked> include resolved</label>
  </div>
  <div class="c-card-body" id="ops-activity"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/pages/ops.js"></script>
{% endblock %}
