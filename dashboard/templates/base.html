<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}EdgeFinder{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9670;</text></svg>">
  <script>
    // pre-paint theme (no flash): data-theme drives the new token CSS;
    // the legacy body class is mirrored in common.js on DOMContentLoaded
    document.documentElement.setAttribute('data-theme',
      localStorage.getItem('ef-theme') === 'light' ? 'light' : 'dark');
  </script>
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/charts.css">
  <!-- vendored (pinned, no CDN dependency) — TradingView Lightweight Charts v4.1.0, Apache-2.0 -->
  <script src="/static/vendor/lightweight-charts.standalone.production.js"></script>
  <script src="/static/js/common.js"></script>
  <script type="module" src="/static/js/core/nav.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
<script>if(localStorage.getItem('ef-theme')==='light')document.body.classList.add('light-mode')</script>

<!-- Top Navigation Bar -->
<nav class="topnav">
  <div class="topnav-brand">
    <span class="icon">&#9670;</span> EdgeFinder
  </div>
  <div class="topnav-tabs">
    <a href="/" class="topnav-tab">Dashboard</a>
    <a href="/strategies" class="topnav-tab">Strategies</a>
    <a href="/screener" class="topnav-tab">Screener</a>
    <a href="/trades" class="topnav-tab">Trades</a>
    <a href="/symbol" class="topnav-tab">Chart</a>
    <a href="/lab" class="topnav-tab">Lab</a>
    <a href="/ops" class="topnav-tab">Ops</a>
  </div>
  <div class="topnav-right">
    <div id="topnav-indices" class="topnav-indices"></div>
    <button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <div id="topnav-status" class="topnav-status">
      <span class="dot"></span> ...
    </div>
  </div>
</nav>

<!-- Page Content -->
<main class="page">
  {% block content %}{% endblock %}
</main>

<!-- Mobile bottom tab bar (hidden ≥768px) -->
<nav class="tabbar">
  <a href="/" class="tabbar-item"><span class="glyph">&#9632;</span>Portfolio</a>
  <a href="/symbol" class="tabbar-item"><span class="glyph">&#9651;</span>Chart</a>
  <a href="/trades" class="tabbar-item"><span class="glyph">&#8645;</span>Trades</a>
  <a href="/lab" class="tabbar-item"><span class="glyph">&#9881;</span>Lab</a>
  <button id="tabbar-more" class="tabbar-item" type="button"><span class="glyph">&#8943;</span>More</button>
</nav>
<div class="sheet-backdrop"></div>
<div class="sheet">
  <div class="sheet-grab"></div>
  <a href="/strategies" class="sheet-link">Strategies</a>
  <a href="/screener" class="sheet-link">Screener</a>
  <a href="/ops" class="sheet-link">Ops</a>
  <button class="sheet-link" type="button" onclick="toggleTheme()">Toggle theme</button>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
