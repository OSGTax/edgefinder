{% extends "base.html" %}
{% block title %}Trades — EdgeFinder{% endblock %}

{% block content %}
<div class="flex items-center gap-12 mb-16 flex-wrap">
  <h2 class="flex-1">Trades</h2>
  <span id="tr-integrity"></span>
</div>

<div id="tr-stats" class="grid-4 mb-16"></div>

<div class="ch-toolbar">
  <select id="tr-strategy" class="c-select"><option value="">All strategies</option></select>
  <div class="c-seg" id="tr-status">
    <button data-status="" class="active">All</button>
    <button data-status="OPEN">Open</button>
    <button data-status="wins">Wins</button>
    <button data-status="losses">Losses</button>
  </div>
  <input id="tr-symbol" class="c-input" placeholder="Symbol…">
</div>

<div class="c-card">
  <div class="c-card-body tight c-table-wrap" id="tr-table"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/pages/trades.js"></script>
{% endblock %}
