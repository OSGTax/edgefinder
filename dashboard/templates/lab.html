{% extends "base.html" %}
{% block title %}Lab — EdgeFinder{% endblock %}

{% block content %}
<div class="flex items-center gap-12 mb-16 flex-wrap">
  <h2 class="flex-1">Hunt / Lab</h2>
  <div class="c-seg" id="lab-tabs">
    <button data-tab="scoreboard" class="active">Scoreboard</button>
    <button data-tab="runs">Runs</button>
    <button data-tab="backtest">Backtest</button>
  </div>
</div>

<!-- Scoreboard tab -->
<section id="tab-scoreboard">
  <div id="sb-progress" class="c-card mb-16"><div class="c-card-body" id="sb-progress-body"></div></div>
  <div id="sb-finalists" class="grid-2"></div>
</section>

<!-- Runs tab -->
<section id="tab-runs" class="hidden">
  <div class="ch-toolbar" id="runs-filters">
    <select id="rf-label" class="c-select"><option value="">All labels</option></select>
    <input id="rf-strategy" class="c-input" placeholder="Strategy contains…">
    <select id="rf-verdict" class="c-select">
      <option value="">Verdict</option><option>PASS</option><option>FAIL</option>
    </select>
    <select id="rf-holdout" class="c-select">
      <option value="">Holdout</option>
      <option value="sealed">Sealed</option>
      <option value="pass">Passed</option>
      <option value="fail">Failed</option>
    </select>
    <button id="rf-compare" class="c-btn hidden">Compare (0)</button>
  </div>
  <div class="c-card"><div class="c-card-body tight c-table-wrap" id="runs-table"></div></div>
  <div class="flex items-center gap-12 mt-8" id="runs-pager"></div>
</section>

<!-- Backtest tab -->
<section id="tab-backtest" class="hidden">
  <div class="c-card mb-16">
    <div class="c-card-header">Quick backtest (legacy per-ticker lab)</div>
    <div class="c-card-body">
      <form id="bt-form" class="flex flex-wrap gap-12 items-end">
        <label class="flex-col gap-4">Strategy
          <select id="bt-strategy" class="c-select"></select></label>
        <label class="flex-col gap-4">Universe
          <select id="bt-mode" class="c-select">
            <option value="symbols">Symbols</option>
            <option value="top">Top-N liquid</option>
            <option value="full">Full</option>
          </select></label>
        <label class="flex-col gap-4" id="bt-symbols-wrap">Symbols
          <input id="bt-symbols" class="c-input" value="AAPL,NVDA,TSLA"></label>
        <label class="flex-col gap-4 hidden" id="bt-topn-wrap">Top N
          <input id="bt-topn" class="c-input" type="number" value="100"></label>
        <label class="flex-col gap-4">Start
          <input id="bt-start" class="c-input" type="date"></label>
        <label class="flex-col gap-4">End
          <input id="bt-end" class="c-input" type="date"></label>
        <label class="flex-col gap-4">Cash
          <input id="bt-cash" class="c-input" type="number" value="10000"></label>
        <button class="c-btn primary" type="submit">Run</button>
      </form>
    </div>
  </div>
  <div id="bt-results"></div>
</section>

<!-- run detail drawer -->
<div id="run-drawer" class="c-drawer">
  <div class="c-drawer-head">
    <strong id="run-drawer-title">Run</strong>
    <span class="spacer"></span>
    <button class="c-btn ghost" id="run-drawer-close">✕</button>
  </div>
  <div class="c-drawer-body" id="run-drawer-body"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/pages/lab.js"></script>
{% endblock %}
