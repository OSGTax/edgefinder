{% extends "base.html" %}
{% block title %}Picks — EdgeFinder{% endblock %}

{% block content %}
<div class="flex items-center gap-12 mb-16 flex-wrap">
  <h2 class="flex-1">Daily Picks <span class="t-dim">— AI Analyst</span></h2>
  <span id="picks-date" class="c-pill neutral"></span>
  <a href="/strategies" class="c-btn ghost">Account</a>
  <button id="picks-run" class="c-btn ghost">Run research now</button>
</div>

<div class="c-card mb-16"><div class="c-card-body" id="picks-summary"></div></div>

<div id="picks-list" class="grid-2"></div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/pages/picks.js"></script>
{% endblock %}
