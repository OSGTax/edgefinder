{% extends "base.html" %}
{% block title %}Screener — EdgeFinder{% endblock %}

{% block content %}
<div class="flex items-center gap-12 mb-16 flex-wrap">
  <h2 class="flex-1">Screener</h2>
</div>

<div class="c-card mb-16">
  <div class="c-card-header">Sector rotation (RRG quadrants) <span class="spacer"></span><span id="sc-sector-clear"></span></div>
  <div class="c-card-body"><div id="sc-treemap"></div></div>
</div>

<div class="ch-toolbar">
  <select id="sc-strategy" class="c-select"><option value="">All strategies</option></select>
  <input id="sc-search" class="c-input" placeholder="Symbol / company…">
</div>

<div class="c-card mb-16">
  <div class="c-card-header">Ranked watchlist (scanner qualifications)</div>
  <div class="c-card-body tight c-table-wrap" id="sc-watchlist"></div>
</div>

<div class="c-card">
  <div class="c-card-header">Universe</div>
  <div class="c-card-body tight c-table-wrap" id="sc-table"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/pages/screener.js"></script>
{% endblock %}
